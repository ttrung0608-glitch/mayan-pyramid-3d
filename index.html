<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mayan Pyramid Cinematic</title>

<style>
body{
margin:0;
overflow:hidden;
background:#020403;
font-family:Arial;
}

#title{
position:absolute;
top:15px;
left:15px;
color:white;
background:rgba(0,0,0,0.5);
padding:12px;
border-radius:10px;
}
</style>

</head>

<body>

<div id="title">
🏛️ Mayan Pyramid Cinematic<br>
Drag to rotate • Scroll to zoom
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';

const scene = new THREE.Scene();

scene.fog = new THREE.Fog(0x0a120a,10,80);

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(20,15,30);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;

document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

//////////////////////////
// LIGHTING (cinematic)
//////////////////////////

const sun = new THREE.DirectionalLight(0xfff2cc,2);
sun.position.set(30,50,20);
sun.castShadow=true;
scene.add(sun);

const ambient = new THREE.AmbientLight(0x334433,0.6);
scene.add(ambient);

//////////////////////////
// GROUND
//////////////////////////

const groundGeo = new THREE.PlaneGeometry(300,300);

const groundMat = new THREE.MeshStandardMaterial({
color:0x1c2b1c,
roughness:1
});

const ground = new THREE.Mesh(groundGeo,groundMat);

ground.rotation.x=-Math.PI/2;
ground.receiveShadow=true;

scene.add(ground);

//////////////////////////
// LOAD PYRAMID
//////////////////////////

const loader = new GLTFLoader();

loader.load("Mayan_Pyramide.glb",(model)=>{

model.scene.scale.set(1,1,1);

model.scene.traverse((child)=>{
if(child.isMesh){
child.castShadow=true;
child.receiveShadow=true;
}
});

scene.add(model.scene);

});

//////////////////////////
// ANIMATE
//////////////////////////

function animate(){

requestAnimationFrame(animate);

controls.update();

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
