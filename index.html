<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mayan Pyramid 3D</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:#0b1d0b;
font-family:Arial;
}

#title{
position:absolute;
top:15px;
left:15px;
color:white;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:10px;
}

model-viewer{
width:100vw;
height:100vh;
}

</style>

</head>

<body>

<div id="title">
Mayan Pyramid 3D<br>
Drag to rotate • Scroll to zoom
</div>

<model-viewer
src="Mayan_Pyramide.glb"
auto-rotate
auto-rotate-delay="0"
camera-controls
shadow-intensity="1.5"
environment-image="https://modelviewer.dev/shared-assets/environments/forest_1k.hdr"
exposure="1.1"
ar
ar-modes="webxr scene-viewer quick-look"
camera-orbit="45deg 60deg 8m"
>

</model-viewer>

</body>
</html>
