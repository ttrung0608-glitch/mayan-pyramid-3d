<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mayan Pyramid 3D Viewer</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
}

model-viewer{
width:100vw;
height:100vh;
}

#title{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div id="title">
Mayan Pyramid 3D<br>
Drag to rotate • Scroll to zoom
</div>

<model-viewer
src="model.glb"
auto-rotate
camera-controls
shadow-intensity="1"
environment-image="neutral"
ar>
</model-viewer>

</body>
</html>
